name: Board Shelf
options:
  bundleIdPrefix: com.shimondeitel.boardshelf
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Board Shelf:
    type: application
    platform: iOS
    sources:
      - path: Board Shelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.boardshelf
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Board Shelf/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Board ShelfTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Board ShelfTests
      - path: Board Shelf.storekit
    dependencies:
      - target: Board Shelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.boardshelf.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Board ShelfUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Board ShelfUITests
    dependencies:
      - target: Board Shelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.boardshelf.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Board Shelf:
    build:
      targets:
        Board Shelf: all
        Board ShelfTests: [test]
        Board ShelfUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Board Shelf.storekit
    test:
      config: Debug
      storeKitConfiguration: Board Shelf.storekit
      targets:
        - Board ShelfTests
        - Board ShelfUITests
    archive:
      config: Release
